<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行程名稱 — 旅遊行程</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .hero {
      position: relative;
      height: 50vh;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(108,99,255,.2) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(255,140,100,.15) 0%, transparent 55%);
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-badge {
      display: inline-block;
      padding: 5px 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      font-size: .75rem;
      letter-spacing: .12em;
      color: #c9b8ff;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
    }

    .hero-sub { color: rgba(255,255,255,.45); font-size: .85rem; margin-top: .5rem; }

    /* ── Day card ── */
    .day-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #6c63ff;
    }

    .day-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #f0f0ff;
    }

    .sched-item {
      display: grid;
      grid-template-columns: 65px 1fr;
      gap: .4rem .8rem;
      padding: .6rem 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .sched-item:last-child { border-bottom: none; }

    .time-col { font-size: .75rem; font-weight: 700; color: rgba(255,255,255,.3); padding-top: 3px; }
    .spot-name { font-size: .9rem; font-weight: 600; color: #f0f0ff; }
    .spot-desc { font-size: .78rem; color: rgba(255,255,255,.45); margin-top: .15rem; line-height: 1.5; }
  </style>
</head>
<body>

<!-- Hero — 修改標題與日期 -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-badge">✈ YYYY TRAVEL PLAN</div>
    <h1 class="gradient-text">行程標題</h1>
    <p class="hero-sub">城市A · 城市B　｜　MM/DD – MM/DD</p>
  </div>
</section>

<!-- 返回按鈕 -->
<div class="page-header">
  <a href="../../index.html" class="back-link">← 所有行程</a>
</div>

<div class="container">

  <!-- ── 第一天 ── -->
  <div class="day-card">
    <div class="day-title">D1　MM/DD　📍 地點</div>
    <div class="sched-item">
      <span class="time-col">09:00</span>
      <div>
        <div class="spot-name">景點名稱</div>
        <div class="spot-desc">景點說明文字。</div>
      </div>
    </div>
    <div class="sched-item">
      <span class="time-col">12:00</span>
      <div>
        <div class="spot-name">午餐</div>
        <div class="spot-desc">餐廳推薦。</div>
      </div>
    </div>
  </div>

  <!-- ── 複製上面的 day-card 區塊新增天數 ── -->

</div>

<script src="../../assets/js/app.js"></script>
</body>
</html>
